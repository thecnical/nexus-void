services:
  - type: web
    name: nexus-void-backend
    runtime: docker
    plan: standard
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GO_ENV
        value: production
      - key: PORT
        value: 8080
      - key: NEXUS_BRAIN_DIR
        value: /var/lib/nexus-void/brain
      - key: NEXUS_AI_OPENROUTER_KEY
        sync: false
      - key: NEXUS_AI_GROQ_KEY
        sync: false
      - key: NEXUS_JIRA_URL
        sync: false
      - key: NEXUS_JIRA_USER
        sync: false
      - key: NEXUS_JIRA_TOKEN
        sync: false
      - key: NEXUS_MISP_URL
        sync: false
      - key: NEXUS_MISP_KEY
        sync: false
      - key: NEXUS_OPENCTI_URL
        sync: false
      - key: NEXUS_OPENCTI_TOKEN
        sync: false
      - key: NEXUS_EMAIL_SMTP_HOST
        sync: false
      - key: NEXUS_EMAIL_SMTP_PORT
        sync: false
      - key: NEXUS_EMAIL_USER
        sync: false
      - key: NEXUS_EMAIL_PASS
        sync: false
      - key: NEXUS_EMAIL_FROM
        sync: false
      - key: NEXUS_EMAIL_TO
        sync: false
    healthCheckPath: /api/status
    autoDeploy: true
    disk:
      name: nexus-brain-data
      mountPath: /var/lib/nexus-void/brain
      sizeGB: 5
